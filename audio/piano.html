<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Piano</title>
    <link rel="stylesheet" href="./style/piano.css" />
    <style>
      * {
        user-select: none;
      }
    </style>
  </head>

  <body>
    <div class="switch-container">
      <label class="switch-label">
        <input type="checkbox" id="label-toggle" />
        <span>显示键盘提示</span>
      </label>
    </div>

    <div id="piano-keyboard" class="piano-keyboard"></div>

    <script type="module">
      // 52 白色，36 黑色
      import { Piano } from './js/piano.js';
      // import { NotePlay, Sequence } from './js/music.js'
      window.piano = new Piano();

      const toggle = document.getElementById('label-toggle');
      toggle.addEventListener('change', (e) => {
        if (e.target.checked) {
          document.body.classList.add('show-labels');
        } else {
          document.body.classList.remove('show-labels');
        }
      });
    </script>
  </body>
</html>
